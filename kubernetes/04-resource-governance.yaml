apiVersion: v1
kind: ResourceQuota
metadata:
  name: sentinel-app-quota
  namespace: sentinel-app
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "24"
    limits.memory: 48Gi
    pods: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: sentinel-app-defaults
  namespace: sentinel-app
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      default:
        cpu: "1"
        memory: 1Gi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: sentinel-workers-quota
  namespace: sentinel-workers
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "24"
    limits.memory: 48Gi
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: sentinel-workers-defaults
  namespace: sentinel-workers
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      default:
        cpu: "1"
        memory: 1Gi
