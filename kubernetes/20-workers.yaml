apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-worker
  namespace: sentinel-workers
  labels: {app.kubernetes.io/name: inventory-worker, app.kubernetes.io/part-of: sentinel}
spec:
  replicas: 0
  selector:
    matchLabels: {app.kubernetes.io/name: inventory-worker}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-worker
        app.kubernetes.io/part-of: sentinel
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: inventory-worker
      securityContext:
        runAsNonRoot: true
        runAsUser: 102
        runAsGroup: 102
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: inventory-worker
          image: elzabeth03/sentinel-inventory-service:v1.0.5
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "sentinel_inventory.worker"]
          envFrom:
            - secretRef: {name: sentinel-runtime-config}
          env:
            - name: SENTINEL_DATABASE_URL
              valueFrom:
                secretKeyRef: {name: inventory-worker-runtime, key: database-url}
            - name: SENTINEL_INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef: {name: inventory-worker-runtime, key: internal-api-token}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits: {cpu: "2", memory: 2Gi}
          volumeMounts:
            - {name: key-vault, mountPath: /mnt/secrets-store, readOnly: true}
            - {name: runtime-config, mountPath: /mnt/runtime-config, readOnly: true}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: key-vault
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes: {secretProviderClass: inventory-worker-secrets}
        - name: runtime-config
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes: {secretProviderClass: runtime-config}
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-relay
  namespace: sentinel-workers
  labels: {app.kubernetes.io/name: outbox-relay, app.kubernetes.io/part-of: sentinel}
spec:
  replicas: 0
  selector:
    matchLabels: {app.kubernetes.io/name: outbox-relay}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: outbox-relay
        app.kubernetes.io/part-of: sentinel
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: outbox-relay
      securityContext:
        runAsNonRoot: true
        runAsUser: 102
        runAsGroup: 102
        seccompProfile: {type: RuntimeDefault}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels: {app.kubernetes.io/name: outbox-relay}
      containers:
        - name: outbox-relay
          image: elzabeth03/sentinel-audit-service:v1.0.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "sentinel_common.outbox_worker"]
          envFrom:
            - secretRef: {name: sentinel-runtime-config}
          env:
            - name: SENTINEL_DATABASE_URL
              valueFrom:
                secretKeyRef: {name: outbox-relay-runtime, key: database-url}
            - name: SENTINEL_INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef: {name: outbox-relay-runtime, key: internal-api-token}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: "1", memory: 1Gi}
          volumeMounts:
            - {name: key-vault, mountPath: /mnt/secrets-store, readOnly: true}
            - {name: runtime-config, mountPath: /mnt/runtime-config, readOnly: true}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: key-vault
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes: {secretProviderClass: outbox-relay-secrets}
        - name: runtime-config
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes: {secretProviderClass: runtime-config}
        - name: tmp
          emptyDir: {}
