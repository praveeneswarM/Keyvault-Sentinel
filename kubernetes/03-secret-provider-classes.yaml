apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: runtime-config
  namespace: sentinel-app
spec:
  provider: azure
  secretObjects:
    - secretName: sentinel-runtime-config
      type: Opaque
      data:
        - {objectName: config-sentinel-environment, key: SENTINEL_ENVIRONMENT}
        - {objectName: config-sentinel-log-level, key: SENTINEL_LOG_LEVEL}
        - {objectName: config-sentinel-entra-audience, key: SENTINEL_ENTRA_AUDIENCE}
        - {objectName: config-sentinel-entra-authority-host, key: SENTINEL_ENTRA_AUTHORITY_HOST}
        - {objectName: config-sentinel-microsoft-client-id, key: SENTINEL_MICROSOFT_CLIENT_ID}
        - {objectName: config-sentinel-microsoft-redirect-uri, key: SENTINEL_MICROSOFT_REDIRECT_URI}
        - {objectName: config-sentinel-frontend-url, key: SENTINEL_FRONTEND_URL}
        - {objectName: config-sentinel-session-cookie-name, key: SENTINEL_SESSION_COOKIE_NAME}
        - {objectName: config-sentinel-session-cookie-secure, key: SENTINEL_SESSION_COOKIE_SECURE}
        - {objectName: config-sentinel-session-ttl-seconds, key: SENTINEL_SESSION_TTL_SECONDS}
        - {objectName: config-sentinel-allowed-tenants, key: SENTINEL_ALLOWED_TENANTS}
        - {objectName: config-sentinel-cors-origins, key: SENTINEL_CORS_ORIGINS}
        - {objectName: config-sentinel-identity-service-url, key: SENTINEL_IDENTITY_SERVICE_URL}
        - {objectName: config-sentinel-audit-service-url, key: SENTINEL_AUDIT_SERVICE_URL}
        - {objectName: config-sentinel-relationship-service-url, key: SENTINEL_RELATIONSHIP_SERVICE_URL}
        - {objectName: config-sentinel-login-blob-container-name, key: SENTINEL_LOGIN_BLOB_CONTAINER_NAME}
        - {objectName: config-azure-tenant-id, key: AZURE_TENANT_ID}
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: d39b6820-67e3-4c9a-bd15-ca63c65fa90c
    keyvaultName: keyvaultdemo-1
    tenantId: 6206e18c-53ff-46fb-856b-d8435455825a
    objects: |
      array:
        - |
          objectName: config-sentinel-environment
          objectType: secret
        - |
          objectName: config-sentinel-log-level
          objectType: secret
        - |
          objectName: config-sentinel-entra-audience
          objectType: secret
        - |
          objectName: config-sentinel-entra-authority-host
          objectType: secret
        - |
          objectName: config-sentinel-microsoft-client-id
          objectType: secret
        - |
          objectName: config-sentinel-microsoft-redirect-uri
          objectType: secret
        - |
          objectName: config-sentinel-frontend-url
          objectType: secret
        - |
          objectName: config-sentinel-session-cookie-name
          objectType: secret
        - |
          objectName: config-sentinel-session-cookie-secure
          objectType: secret
        - |
          objectName: config-sentinel-session-ttl-seconds
          objectType: secret
        - |
          objectName: config-sentinel-allowed-tenants
          objectType: secret
        - |
          objectName: config-sentinel-cors-origins
          objectType: secret
        - |
          objectName: config-sentinel-identity-service-url
          objectType: secret
        - |
          objectName: config-sentinel-audit-service-url
          objectType: secret
        - |
          objectName: config-sentinel-relationship-service-url
          objectType: secret
        - |
          objectName: config-sentinel-login-blob-container-name
          objectType: secret
        - |
          objectName: config-azure-tenant-id
          objectType: secret
