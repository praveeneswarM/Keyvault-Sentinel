apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: sentinel-app
  labels:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/part-of: sentinel
spec:
  replicas: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory-service
        app.kubernetes.io/part-of: sentinel
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: inventory-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 102
        runAsGroup: 102
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: inventory-service
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: inventory-service
      containers:
        - name: inventory-service
          image: elzabeth03/sentinel-inventory-service:v1.0.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: sentinel-runtime-config
          env:
            - name: SENTINEL_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: inventory-service-runtime
                  key: database-url
            - name: SENTINEL_INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: inventory-service-runtime
                  key: internal-api-token
          startupProbe:
            httpGet: {path: /health/live, port: http}
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet: {path: /health/ready, port: http}
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: {path: /health/live, port: http}
            periodSeconds: 20
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: "1", memory: 1Gi}
          volumeMounts:
            - {name: key-vault, mountPath: /mnt/secrets-store, readOnly: true}
            - {name: runtime-config, mountPath: /mnt/runtime-config, readOnly: true}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: key-vault
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: inventory-service-secrets
        - name: runtime-config
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: runtime-config
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: sentinel-app
  labels:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/part-of: sentinel
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: inventory-service
  ports:
    - {name: http, port: 80, targetPort: http}
