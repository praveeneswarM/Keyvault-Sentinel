apiVersion: batch/v1
kind: Job
metadata:
  name: sentinel-database-migration
  namespace: sentinel-app
  labels:
    app.kubernetes.io/name: sentinel-database-migration
    app.kubernetes.io/part-of: sentinel
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinel-database-migration
        app.kubernetes.io/part-of: sentinel
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 102
        runAsGroup: 102
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migration
          image: elzabeth03/sentinel-migration:v1.0.3
          imagePullPolicy: IfNotPresent
          env:
            - name: SENTINEL_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: identity-service-runtime
                  key: database-url
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
