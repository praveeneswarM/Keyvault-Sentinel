apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: default-deny, namespace: sentinel-app}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: default-deny, namespace: sentinel-workers}
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-dns, namespace: sentinel-app}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: {kubernetes.io/metadata.name: kube-system}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-dns, namespace: sentinel-workers}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: {kubernetes.io/metadata.name: kube-system}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-public-gateway, namespace: sentinel-app}
spec:
  podSelector:
    matchLabels: {app.kubernetes.io/name: sentinel-gateway}
  policyTypes: [Ingress]
  ingress:
    - ports:
        - {protocol: TCP, port: 8080}
        - {protocol: TCP, port: 8443}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-app-internal-http, namespace: sentinel-app}
spec:
  podSelector:
    matchLabels: {app.kubernetes.io/part-of: sentinel}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels: {app.kubernetes.io/part-of: sentinel}
      ports:
        - {protocol: TCP, port: 3000}
        - {protocol: TCP, port: 8000}
        - {protocol: TCP, port: 8080}
    - from:
        - namespaceSelector:
            matchLabels: {kubernetes.io/metadata.name: sentinel-workers}
      ports:
        - {protocol: TCP, port: 8000}
  egress:
    - to:
        - podSelector:
            matchLabels: {app.kubernetes.io/part-of: sentinel}
      ports:
        - {protocol: TCP, port: 3000}
        - {protocol: TCP, port: 8000}
        - {protocol: TCP, port: 8080}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-workers-to-app, namespace: sentinel-workers}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels: {kubernetes.io/metadata.name: sentinel-app}
          podSelector:
            matchLabels: {app.kubernetes.io/part-of: sentinel}
      ports:
        - {protocol: TCP, port: 8000}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-postgresql, namespace: sentinel-app}
spec:
  podSelector:
    matchLabels: {app.kubernetes.io/part-of: sentinel}
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - {protocol: TCP, port: 5432}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-postgresql, namespace: sentinel-workers}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - {protocol: TCP, port: 5432}
---
